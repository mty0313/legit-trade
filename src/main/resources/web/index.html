<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegitTrade 配置</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>LegitTrade 配置</h1>
            <button id="saveBtn" class="btn primary">保存配置</button>
        </header>

        <main>
            <div class="groups-panel">
                <div class="panel-header">
                    <h2>交易分组</h2>
                    <button id="addGroupBtn" class="btn">+ 新建分组</button>
                </div>
                <div id="groupsList"></div>
            </div>

            <div class="trades-panel" id="tradesPanel" style="display:none;">
                <div class="panel-header">
                    <h2 id="currentGroupName">交易列表</h2>
                    <button id="addTradeBtn" class="btn">+ 新建交易</button>
                </div>
                <div id="tradesList">
                    <div class="hint">点击左侧分组查看交易</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for editing/adding trades -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="editModal">
            <div class="modal-header">
                <h2 id="modalTitle">新建交易</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form id="tradeForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>输入物品</label>
                        <input type="text" id="inputItem" placeholder="点击选择或搜索物品..." autocomplete="off">
                        <div id="inputItemSuggestions" class="suggestions"></div>
                        <div id="inputItemPreview" class="item-preview"></div>
                    </div>
                    <div class="form-group">
                        <label>输入数量</label>
                        <input type="number" id="inputCount" min="1" max="64" value="1">
                    </div>
                </div>

                <div class="form-group">
                    <label>输入 NBT (可选)</label>
                    <div class="nbt-field">
                        <div id="inputNbtPreview" class="nbt-preview">未设置</div>
                        <button type="button" class="btn" id="inputNbtBtn">编辑 NBT</button>
                    </div>
                    <input type="hidden" id="inputNbt">
                    <div id="inputNbtError" class="error"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>输出物品</label>
                        <input type="text" id="outputItem" placeholder="点击选择或搜索物品..." autocomplete="off">
                        <div id="outputItemSuggestions" class="suggestions"></div>
                        <div id="outputItemPreview" class="item-preview"></div>
                    </div>
                    <div class="form-group">
                        <label>输出数量</label>
                        <input type="number" id="outputCount" min="1" max="64" value="1">
                    </div>
                </div>

                <div class="form-group">
                    <label>输出 NBT (可选)</label>
                    <div class="nbt-field">
                        <div id="outputNbtPreview" class="nbt-preview">未设置</div>
                        <button type="button" class="btn" id="outputNbtBtn">编辑 NBT</button>
                    </div>
                    <input type="hidden" id="outputNbt">
                    <div id="outputNbtError" class="error"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>NBT 匹配模式</label>
                        <select id="nbtMatchMode">
                            <option value="exact">精确匹配</option>
                            <option value="contains">包含匹配</option>
                            <option value="ignore">忽略 NBT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>经验奖励</label>
                        <input type="number" id="xpReward" min="0" value="0">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn" id="cancelBtn">取消</button>
                    <button type="submit" class="btn primary">保存交易</button>
                    <button type="button" id="deleteTradeBtn" class="btn danger" style="display:none;">删除交易</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for NBT editor -->
    <div class="modal-overlay" id="nbtModalOverlay">
        <div class="modal nbt-modal" id="nbtModal">
            <div class="modal-header">
                <h2 id="nbtModalTitle">编辑 NBT</h2>
                <button class="modal-close" id="closeNbtModal">&times;</button>
            </div>
            <div class="nbt-editor-content">
                <div class="form-group">
                    <label>NBT JSON</label>
                    <textarea id="nbtTextarea" placeholder='{"key":"value"}'></textarea>
                    <div id="nbtTextareaError" class="error"></div>
                </div>

                <div class="nbt-quick-actions">
                    <button type="button" class="btn" id="nbtClearBtn">清除</button>
                    <button type="button" class="btn" id="nbtCustomNameBtn">自定义名称</button>
                </div>

                <div class="nbt-templates-section">
                    <h3>装备附魔</h3>
                    <div class="nbt-template-grid">
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:sharpness","lvl":5}]}'>锋利V</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:smite","lvl":5}]}'>亡灵杀手V</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:bane_of_arthropods","lvl":5}]}'>节肢杀手V</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:protection","lvl":4}]}'>保护IV</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:blast_protection","lvl":4}]}'>爆炸保护IV</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:fire_protection","lvl":4}]}'>火焰保护IV</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:projectile_protection","lvl":4}]}'>弹射物保护IV</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:feather_falling","lvl":4}]}'>摔落缓冲IV</button>
                    </div>

                    <h3>工具附魔</h3>
                    <div class="nbt-template-grid">
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:efficiency","lvl":5}]}'>效率V</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:fortune","lvl":3}]}'>时运III</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:silk_touch","lvl":1}]}'>精准采集</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:unbreaking","lvl":3}]}'>耐久III</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:mending","lvl":1}]}'>经验修补</button>
                    </div>

                    <h3>武器附魔</h3>
                    <div class="nbt-template-grid">
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:looting","lvl":3}]}'>抢夺III</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:fire_aspect","lvl":2}]}'>火焰附加II</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:knockback","lvl":2}]}'>击退II</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:sweeping","lvl":3}]}'>横扫之刃III</button>
                    </div>

                    <h3>弓/弩附魔</h3>
                    <div class="nbt-template-grid">
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:power","lvl":5}]}'>力量V</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:punch","lvl":2}]}'>冲击II</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:flame","lvl":1}]}'>火矢</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:infinity","lvl":1}]}'>无限</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:multishot","lvl":1}]}'>多重射击</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"Enchantments":[{"id":"minecraft:quick_charge","lvl":3}]}'>快速装填III</button>
                    </div>

                    <h3>附魔书</h3>
                    <div class="nbt-template-grid">
                        <button type="button" class="nbt-template-btn" data-nbt='{"StoredEnchantments":[{"id":"minecraft:sharpness","lvl":5}]}'>锋利V</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"StoredEnchantments":[{"id":"minecraft:protection","lvl":4}]}'>保护IV</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"StoredEnchantments":[{"id":"minecraft:mending","lvl":1}]}'>经验修补</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"StoredEnchantments":[{"id":"minecraft:unbreaking","lvl":3}]}'>耐久III</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"StoredEnchantments":[{"id":"minecraft:fortune","lvl":3}]}'>时运III</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"StoredEnchantments":[{"id":"minecraft:silk_touch","lvl":1}]}'>精准采集</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"StoredEnchantments":[{"id":"minecraft:efficiency","lvl":5}]}'>效率V</button>
                        <button type="button" class="nbt-template-btn" data-nbt='{"StoredEnchantments":[{"id":"minecraft:looting","lvl":3}]}'>抢夺III</button>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn" id="nbtCancelBtn">取消</button>
                    <button type="button" class="btn primary" id="nbtConfirmBtn">确认</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
